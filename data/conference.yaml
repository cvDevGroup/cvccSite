  - id: panel
    title: "Panel: IT EDUCATION DEATHMATCH"
    sessionTime: "12:45 pm"
    location: "Commons"
    weight: 11
    description: |
      This gameshow will decide once-and-for-all which kind of IT education is best! Five different kinds of educators will compete in a bloodthirsty head-to-head competition where they will answer questions about how they approach educating their students/stakeholders:

      - Children's Education <br/> &nbsp; &nbsp; &nbsp; Represented by Councilman Nate Otto, _Eau Claire City Councilman and School Teacher_
      - Tradeschool <br/> &nbsp; &nbsp; &nbsp; Represented by Director Kyle Lowenhagen, _CVTC's IT/DA Program Director and longtime instructor_
      - Collegiate <br/> &nbsp; &nbsp; &nbsp; Represented by Dr. Benjamin Anderson, _Doctor of Vocational Education and Director of Privacy Engineering at Paramount_
      - Professional In-house <br/> &nbsp; &nbsp; &nbsp; Represented by Mr. Brian Hogan, _Head of Technical Content at Tailscale, professor, instructor, and author._
      - Professional External <br/> &nbsp; &nbsp; &nbsp; Represented by Mr. Cory LaNou, _Owner of Gopher Guides, specializing in Go software engineering training for Fortune 500 companies. AI & programming educator and content creator._

      ### What is an IT EDUCATION DEATHMATCH?!
      It's kind of like a regular panel, but more fun:
      - When questions are asked, we'll have them up on a projector behind the panelists, including fun graphics with fire and swords.
      - After each round of questions, your gameshow host will award points to the best answer - decided arbitrarily, and awarded an arbitrary amount of points.
      - Moderators will accept questions from the audience, time permitting.
      - A winner will be crowned!

  - id: workshop2
    title: "Build Your Own Private ChatGPT: Local AI with Docker, Ollama, Open WebUI, and ZImage Turbo"
    sessionTime: "1:30 pm"
    location: "Workshop Track"
    weight: 12
    description: |
      [Lwin & Min Maung](/speakers/maungs/)

      Everyone is experimenting with AI — but most organizations are sending sensitive data to third-party cloud services without fully understanding the tradeoffs.

      What if you could run your own private ChatGPT-style system locally (and even hook up additional agents and management systems like OpenClaw)?

      In this hands-on, live-build session, we'll create a fully functional private Chat AI assistant that will create code, images, and talk to you via chat and voice interfaces using:
      - Docker
      - Ollama
      - Open WebUI
      - Local LLMs
      - Local image generation (Z-Image Turbo)
      - TTS using Kokoro AI

      Using only a laptop and open-source tools, we'll build a system that:

      - Runs entirely on your own machine
      - Keeps company data private
      - Remembers conversation history
      - Supports multiple models
      - Generates images locally
      - Can be extended for team use

      No enterprise AI budget required. No cloud lock-in. No sending your data to the internet.

      By the end of this session, you'll understand how local AI actually works — and how you can deploy it yourself or inside your organization.

      This is not theory.
      We will build it live.

  - id: agentops
    title: "AgentOps for Real: Evals, Tracing, and Regression Tests for AI Agents"
    sessionTime: "1:30 pm"
    location: "Presentation Track"
    weight: 14
    description: |
      [Brian Haydin](/speakers/brianh/)

      Shipping an AI agent without observability is like deploying a distributed system with no logging. Learn how to implement evals, tracing, and regression testing so your agents don't quietly degrade into chaos.

      AI agents behave probabilistically — and that breaks traditional testing assumptions.

      So how do you:
      - Detect drift?
      - Prevent silent regressions?
      - Prove your system still works after model updates?
      - Debug weird edge-case behavior?

      In this session, we'll walk through a practical AgentOps stack:
      - Structured evaluation datasets
      - Golden test prompts
      - Scoring strategies (semantic similarity, rule-based, hybrid)
      - Trace capture and replay
      - Logging intermediate reasoning steps
      - Monitoring production agents
      - Designing feedback loops

      We'll implement examples using Azure-based tooling and .NET, including how to structure regression tests for multi-step tool-using agents.

      You'll leave with a repeatable pattern for treating agents like real software — not magic.

  - id: avengers
    title: "How I used the Avengers to build a golf coaching AI to win the 2030 Masters"
    sessionTime: "2:30 pm"
    location: "Presentation Track"
    weight: 30
    description: |
      [Charley Stran](/speakers/charleys/)

      This talk is about how to use an agent development tools with a multi-git checkout multiple folder approach for agent management. The talk covers the building of a real world and deployed tool built using agentic tools both for development and part of the shipped product.

      This is a talk about using a multi-checkout single machine strategy to develop an application end to end as a solo developer. This talk will cover the following areas
      - Agentic development using Claude Code(cli, desktop and web and yes I use all 3)
      - advantages and disadvantages of the multi-checkout approach to 'Agents' (The Avengers!)
      - Using LLM's as part of the end user experience of the app
      - Context demystified. How to manage and use context and prompts when using AI interaction as part of your application
      - What is MCP and why is it your superpower as a dev. Specifically this will focus on playwright, sentry, maestro and gitbhub mcp interaction
      - Mobile development with agents and the unique challenges to the physical device development space
      - Last but not least, this topic covers why both Rails and ActiveAgent are one of the most powerful tools in development today!


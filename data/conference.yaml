  - id: search
    title: "Building an Independent Search Engine That Beats Google (Maybe)"
    sessionTime: "10:30 am"
    location: "Presentation Track"
    weight: 5
    description: |
      [UWEC Student Association for Computing Machinery](/speakers/acmstudents/)

      We built an independent search engine with its own high-performance web index using web scrapers. The talk will walk through the whole engineering outline of our project, from the policy of our web scrapers, to the networking of our Kubernetes cluster, to the high capacity postgresql database that stores the data for millions of website pages.

      In this talk we present [Stultus](https://github.com/ThisIsNotANamepng/search_engine), an open source, modular search engine built on top of its own independent web index. This includes our high-performance cluster of desktop server web scrapers, a high capacity postgresql database, the storage of the scraped web data, the search algorithm, and findings from our downloaded copy of scraped websites.

  - id: vision
    title: "Vision on the Fly - Computer Vision On The Web"
    sessionTime: "11:30 am"
    location: "Presentation Track"
    weight: 6
    description: |
      [Aaron Riedel](/speakers/aaronr/)

      When playing Counterstrike I challenged myself to create a bot that used only vision to play the game. Working on building computer vision showed me the interesting problems with building real-time solutions.

      Computer vision is the field of artificial intelligence that allows machines to interpret images and video. From self driving cars and medical imaging to security cameras and augmented reality filters, vision systems are becoming a core layer of modern technology.

      But building a bot wasn't the hard part... building a system that could process video streams reliably, with low latency, and deploy models quickly was. That challenge evolved into something bigger: creating a platform that makes packaging, deploying, and scaling real-time vision models simple and accessible.


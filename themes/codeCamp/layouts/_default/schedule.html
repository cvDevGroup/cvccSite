{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <div class="columns scheduleLine">
    {{ $sessions := $.Site.Data.conference.sessions }}
    {{ $sorted := sort $sessions "weight" "asc" }}
    {{ range $sorted }}
      <div class="column col-3">{{ .sessionTime }}</div>
      <div class="column col-6">
        <a href="/sessions/{{ .id }}/">{{ .title }}</a>
      </div>
      <div class="column col-3">{{ .location }}</div>
    {{ end }}
    <hr />
  </div>
{{ end }}
